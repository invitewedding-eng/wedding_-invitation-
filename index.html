<!DOCTYPE html>
<html lang="hy">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Հարսանեկան Հրավիրատոմս</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Noto+Sans+Armenian:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>
        /* ----------------------------------------------------
           1. ԲԱԶԱՅԻՆ ՈՃԵՐ (BASE STYLES)
        ---------------------------------------------------- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Noto Sans Armenian', sans-serif;
            background-color: #FAF6F0; /* Մեղմ, տաք կրեմագույն ֆոն */
            color: #333333;
            line-height: 1.8;
            text-align: center;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        h1, h2, h3, .names {
            font-family: 'Playfair Display', serif;
            font-weight: 400;
            color: #6E5343; /* Շագանակագույն/ոսկեգույն տեքստ */
        }

        .section {
            padding: 80px 20px;
            border-bottom: 1px solid #EAE1D4;
        }

        /* ----------------------------------------------------
           2. ԳԼԽԱՎՈՐ ԲԱԺԻՆ (HERO SECTION)
        ---------------------------------------------------- */
        .hero {
            /* Կարդում է main.jpg նկարը քո թղթապանակից */
            background: linear-gradient(rgba(250, 246, 240, 0.3), rgba(250, 246, 240, 0.85)), 
                        url('main.jpg') no-repeat center center/cover;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .hero-title {
            font-size: 1.1rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: #8A7365;
            margin-bottom: 20px;
        }

        .names {
            font-size: 3.8rem;
            margin-bottom: 15px;
            font-style: italic;
        }

        .hero-date {
            font-size: 1.3rem;
            letter-spacing: 3px;
            margin-top: 20px;
            border-top: 1px solid #6E5343;
            border-bottom: 1px solid #6E5343;
            padding: 8px 30px;
            display: inline-block;
        }

        /* ----------------------------------------------------
           3. ՀԵՏՀԱՇՎԱՐԿ (COUNTDOWN)
        ---------------------------------------------------- */
        .countdown-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 40px;
        }

        .countdown-box {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(5px);
            padding: 15px 20px;
            border-radius: 12px;
            min-width: 85px;
            box-shadow: 0 4px 15px rgba(110, 83, 67, 0.08);
        }

        .countdown-number {
            font-size: 2.2rem;
            font-weight: 500;
            color: #6E5343;
            display: block;
            font-family: 'Playfair Display', serif;
        }

        .countdown-label {
            font-size: 0.8rem;
            color: #888888;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* ----------------------------------------------------
           4. ՊԱՏՄՈՒԹՅՈՒՆ ԵՎ ՊԱՏԿԵՐԱՍՐԱՀ (GALLERY)
        ---------------------------------------------------- */
        .story-text {
            font-size: 1.1rem;
            max-width: 600px;
            margin: 25px auto 45px auto;
            color: #555555;
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-top: 30px;
        }

        .gallery img {
            width: 100%;
            height: 350px;
            object-fit: cover;
            border-radius: 12px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.06);
            transition: transform 0.4s ease, box-shadow 0.4s ease;
        }

        .gallery img:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 30px rgba(110, 83, 67, 0.15);
        }

        /* ----------------------------------------------------
           5. ՕՐՎԱ ԾՐԱԳԻՐ (TIMELINE)
        ---------------------------------------------------- */
        .timeline {
            position: relative;
            max-width: 500px;
            margin: 50px auto 0 auto;
        }

        .timeline-item {
            margin-bottom: 50px;
            position: relative;
            text-align: left;
            padding-left: 45px;
            border-left: 1px dashed #B8A69C;
        }

        .timeline-item::before {
            content: '✨';
            position: absolute;
            left: -13px;
            top: -2px;
            background: #FAF6F0;
            font-size: 1.1rem;
            padding: 2px 0;
        }

        .time {
            font-family: 'Playfair Display', serif;
            font-size: 1.3rem;
            font-weight: 600;
            color: #A37F6B;
            margin-bottom: 5px;
        }

        .timeline-item h3 {
            font-size: 1.2rem;
            margin-bottom: 5px;
            color: #4A3B32;
        }

        .timeline-item p {
            color: #666666;
            font-size: 0.95rem;
        }

        /* ----------------------------------------------------
           6. RSVP (ՀԱՍՏԱՏՈՒՄ)
        ---------------------------------------------------- */
        .rsvp-form {
            background: #FFFFFF;
            padding: 45px 35px;
            border-radius: 16px;
            box-shadow: 0 10px 35px rgba(110, 83, 67, 0.06);
            max-width: 500px;
            margin: 40px auto 0 auto;
            text-align: left;
            border: 1px solid #EAE1D4;
        }

        .form-group {
            margin-bottom: 24px;
        }

        .form-group label {
            display: block;
            margin-bottom: 10px;
            font-weight: 500;
            font-size: 0.9rem;
            color: #4A3B32;
        }

        .form-group input[type="text"], 
        .form-group select {
            width: 100%;
            padding: 14px;
            border: 1px solid #EAE1D4;
            border-radius: 8px;
            background-color: #FAFAFA;
            font-family: inherit;
            font-size: 1rem;
            transition: border-color 0.3s;
        }

        .form-group input:focus, 
        .form-group select:focus {
            outline: none;
