<!DOCTYPE html>
<html lang="hy">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Միլենա & Միքայել | Wedding Invitation</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600;700&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">

  <style>

    /* =========================
       GLOBAL STYLES
    ========================== */

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    html{
      scroll-behavior:smooth;
    }

    body{
      background:#f7f7f7;
      color:#111;
      font-family:'Montserrat', sans-serif;
      overflow-x:hidden;
    }

    img{
      width:100%;
      display:block;
      border-radius:18px;
    }

    section{
      padding:90px 7%;
    }

    h1,h2,h3{
      font-family:'Cormorant Garamond', serif;
      letter-spacing:1px;
    }

    .section-title{
      font-size:52px;
      text-align:center;
      margin-bottom:20px;
      font-weight:600;
    }

    .section-subtitle{
      text-align:center;
      color:#555;
      max-width:700px;
      margin:0 auto 60px;
      line-height:1.8;
    }

    /* =========================
       HERO SECTION
    ========================== */

    .hero{
      height:100vh;
      background:
      linear-gradient(rgba(0,0,0,0.45),rgba(0,0,0,0.45)),
      url('https://cdn.shopify.com/s/files/1/0720/6482/7503/files/viber_2026-05-28_16-46-53-330.jpg?v=1779972470');
      background-size:cover;
      background-position:center;
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
      color:white;
      position:relative;
    }

    .hero-content{
      max-width:900px;
      padding:20px;
    }

    .date{
      font-size:28px;
      letter-spacing:8px;
      margin-bottom:20px;
      font-weight:300;
    }

    .hero h1{
      font-size:90px;
      font-weight:600;
      margin-bottom:20px;
    }

    .hero p{
      font-size:22px;
      line-height:1.7;
      margin-bottom:40px;
    }

    .btn{
      display:inline-block;
      padding:16px 40px;
      background:white;
      color:black;
      text-decoration:none;
      border-radius:50px;
      transition:0.4s;
      font-weight:600;
      border:1px solid white;
    }

    .btn:hover{
      background:black;
      color:white;
      transform:translateY(-3px);
    }

    /* =========================
       COUNTDOWN
    ========================== */

    .countdown{
      background:black;
      color:white;
      text-align:center;
      padding:70px 20px;
    }

    .countdown h2{
      font-size:48px;
      margin-bottom:25px;
    }

    .count-boxes{
      display:flex;
      justify-content:center;
      gap:25px;
      flex-wrap:wrap;
    }

    .count-box{
      border:1px solid rgba(255,255,255,0.2);
      padding:25px;
      min-width:120px;
      border-radius:20px;
      backdrop-filter:blur(5px);
      transition:0.4s;
    }

    .count-box:hover{
      transform:translateY(-5px);
      background:white;
      color:black;
    }

    .count-box span{
      display:block;
      font-size:40px;
      font-weight:bold;
      margin-bottom:10px;
    }

    /* =========================
       SAVE THE DATE
    ========================== */

    .gallery{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:25px;
      margin-top:50px;
    }

    .gallery img{
      height:420px;
      object-fit:cover;
      transition:0.5s;
    }

    .gallery img:hover{
      transform:scale(1.03);
    }

    /* =========================
       INVITATION TEXT
    ========================== */

    .message{
      background:white;
      text-align:center;
    }

    .message-box{
      max-width:850px;
      margin:auto;
    }

    .message-box p{
      font-size:22px;
      line-height:2;
      color:#333;
      margin-top:30px;
    }

    /* =========================
       CALENDAR
    ========================== */

    .calendar-section{
      background:#f1f1f1;
      text-align:center;
    }

    .calendar{
      max-width:700px;
      margin:50px auto 0;
      background:white;
      padding:40px;
      border-radius:25px;
      box-shadow:0 10px 30px rgba(0,0,0,0.08);
    }

    .month{
      font-size:50px;
      margin-bottom:30px;
    }

    .days,
    .dates{
      display:grid;
      grid-template-columns:repeat(7,1fr);
      gap:20px;
    }

    .days div{
      font-weight:600;
      color:#444;
    }

    .dates div{
      font-size:28px;
      padding:10px;
      position:relative;
    }

    .heart{
      background:black;
      color:white;
      width:60px;
      height:60px;
      border-radius:50%;
      display:flex;
      align-items:center;
      justify-content:center;
      margin:auto;
      font-weight:bold;
    }

    /* =========================
       COUPLE IMAGE
    ========================== */

    .couple-image img{
      max-width:900px;
      margin:auto;
      border-radius:30px;
    }

    /* =========================
       PROGRAM SECTION
    ========================== */

    .program{
      background:white;
    }

    .timeline{
      max-width:900px;
      margin:70px auto 0;
      display:flex;
      flex-direction:column;
      gap:40px;
    }

    .timeline-item{
      display:flex;
      align-items:center;
      gap:25px;
      padding:25px;
      border:1px solid #ddd;
      border-radius:20px;
      transition:0.4s;
      background:#fafafa;
    }

    .timeline-item:hover{
      transform:translateY(-5px);
      box-shadow:0 10px 20px rgba(0,0,0,0.08);
    }

    .icon{
      font-size:45px;
      min-width:70px;
      text-align:center;
    }

    .timeline-item h3{
      font-size:34px;
      margin-bottom:8px;
    }

    .timeline-item p{
      color:#666;
      line-height:1.7;
    }

    /* =========================
       MAP SECTION
    ========================== */

    .maps{
      background:#f5f5f5;
    }

    .map-grid{
      display:grid;
      grid-template-columns:repeat(2,1fr);
      gap:40px;
      margin-top:60px;
    }

    .map-card{
      background:white;
      border-radius:25px;
      overflow:hidden;
      box-shadow:0 10px 25px rgba(0,0,0,0.08);
      transition:0.4s;
    }

    .map-card:hover{
      transform:translateY(-5px);
    }

    .map-card img{
      height:300px;
      object-fit:cover;
    }

    .map-content{
      padding:30px;
    }

    .map-content h3{
      font-size:36px;
      margin-bottom:15px;
    }

    .map-btn{
      display:inline-block;
      margin-top:20px;
      text-decoration:none;
      color:white;
      background:black;
      padding:14px 28px;
      border-radius:50px;
      transition:0.4s;
    }

    .map-btn:hover{
      background:#444;
    }
