<!DOCTYPE html>
<html lang="hy">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Հարսանեկան Հրավիրատոմս</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Noto+Sans+Armenian:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Noto Sans Armenian', sans-serif;
            background-color: #FAF6F0;
            color: #333;
            line-height: 1.8;
            text-align: center;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        h1, h2, h3, .names {
            font-family: 'Playfair Display', serif;
            color: #6E5343;
        }

        .section {
            padding: 80px 20px;
            border-bottom: 1px solid #EAE1D4;
        }

        /* HERO */
        .hero {
            background: linear-gradient(rgba(250,246,240,0.3), rgba(250,246,240,0.85)),
            url('main.jpg') no-repeat center/cover;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .hero-title {
            font-size: 1.1rem;
            letter-spacing: 3px;
            color: #8A7365;
        }

        .names {
            font-size: 3.5rem;
            font-style: italic;
        }

        .hero-date {
            margin-top: 20px;
            border-top: 1px solid #6E5343;
            border-bottom: 1px solid #6E5343;
            padding: 8px 30px;
        }

        /* COUNTDOWN */
        .countdown-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 40px;
        }

        .countdown-box {
            background: rgba(255,255,255,0.85);
            padding: 15px 20px;
            border-radius: 12px;
        }

        .countdown-number {
            font-size: 2rem;
            color: #6E5343;
        }

        .countdown-label {
            font-size: 0.8rem;
            color: #888;
        }

        /* GALLERY */
        .gallery {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
        }

        .gallery img {
            width: 100%;
            height: 350px;
            object-fit: cover;
            border-radius: 12px;
        }

        /* TIMELINE */
        .timeline {
            max-width: 500px;
            margin: auto;
        }

        .timeline-item {
            border-left: 1px dashed #B8A69C;
            padding-left: 40px;
            margin-bottom: 40px;
            position: relative;
        }

        .timeline-item::before {
            content: "✨";
            position: absolute;
            left: -12px;
        }

        .time {
            font-size: 1.2rem;
            color: #A37F6B;
        }

        /* RSVP */
        .rsvp-form {
            background: #fff;
            padding: 40px;
            border-radius: 16px;
            max-width: 500px;
            margin: auto;
            text-align: left;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 12px;
            border: 1px solid #EAE1D4;
            border-radius: 8px;
        }

        /* FIXED PART */
        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #A37F6B;
        }

    </style>
</head>

<body>

    <section class="hero">
        <div class="hero-title">Հարսանեկան հրավիրատոմս</div>
        <div class="names">Դավիթ & Հասմիկ</div>
        <div class="hero-date">2026 • Օգոստոս</div>
    </section>

</body>
</html>
