
 <!DOCTYPE html>
<html lang="hy">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Միլենա & Միքայել</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>

    /* =========================
       GLOBAL STYLES
    ========================== */

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    html{
      scroll-behavior:smooth;
    }

    body{
      font-family:'Montserrat', sans-serif;
      background:#ffffff;
      color:#111;
      line-height:1.7;
    }

    img{
      width:100%;
      display:block;
    }

    a{
      text-decoration:none;
    }

    .container{
      width:90%;
      max-width:1200px;
      margin:auto;
    }

    section{
      padding:80px 0;
    }

    .section-title{
      text-align:center;
      font-size:38px;
      margin-bottom:18px;
      font-weight:700;
      letter-spacing:1px;
    }

    .section-subtitle{
      text-align:center;
      color:#666;
      margin-bottom:50px;
      font-size:16px;
    }

    /* =========================
       HERO SECTION
    ========================== */

    .hero{
      height:100vh;
      position:relative;
      background:url('https://cdn.shopify.com/s/files/1/0720/6482/7503/files/viber_2026-05-28_16-46-50-850.jpg?v=1779972471') center/cover no-repeat;
      display:flex;
      justify-content:center;
      align-items:center;
      text-align:center;
      overflow:hidden;
    }

    .hero::before{
      content:'';
      position:absolute;
      inset:0;
      background:rgba(0,0,0,0.55);
    }

    .hero-content{
      position:relative;
      z-index:2;
      color:#fff;
      width:90%;
      max-width:900px;
    }

    .date{
      font-size:22px;
      letter-spacing:4px;
      margin-bottom:20px;
      font-weight:300;
    }

    .hero h1{
      font-size:70px;
      font-weight:700;
      margin-bottom:20px;
    }

    .hero p{
      font-size:20px;
      margin-bottom:35px;
      color:#ddd;
    }

    .btn{
      display:inline-block;
      padding:16px 40px;
      background:#fff;
      color:#111;
      border-radius:50px;
      font-weight:600;
      transition:0.3s;
    }

    .btn:hover{
      transform:translateY(-4px);
      background:#111;
      color:#fff;
    }

    /* =========================
       COUNTDOWN
    ========================== */

    .countdown{
      margin-top:40px;
      display:flex;
      justify-content:center;
      gap:20px;
      flex-wrap:wrap;
    }

    .count-box{
      width:120px;
      height:120px;
      border:1px solid rgba(255,255,255,0.3);
      border-radius:20px;
      backdrop-filter:blur(6px);
      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:center;
    }

    .count-box h2{
      font-size:38px;
      color:#fff;
    }

    .count-box span{
      font-size:14px;
      color:#ddd;
      letter-spacing:2px;
    }

    /* =========================
       SAVE THE DATE
    ========================== */

    .save-grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:40px;
      align-items:center;
    }

    .save-images{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:15px;
    }

    .save-images img{
      height:350px;
      object-fit:cover;
      border-radius:20px;
      transition:0.4s;
    }

    .save-images img:hover{
      transform:scale(1.04);
    }

    .save-text h2{
      font-size:55px;
      margin-bottom:20px;
    }

    .save-text p{
      color:#555;
      font-size:17px;
    }

    /* =========================
       INVITATION TEXT
    ========================== */

    .message{
      background:#f8f8f8;
      text-align:center;
    }

    .message-box{
      max-width:850px;
      margin:auto;
    }

    .message-box h2{
      font-size:42px;
      margin-bottom:30px;
    }

    .message-box p{
      font-size:19px;
      color:#444;
    }

    /* =========================
       CALENDAR
    ========================== */

    .calendar-wrapper{
      max-width:700px;
      margin:auto;
      text-align:center;
    }

    .calendar{
      margin-top:40px;
      display:grid;
      grid-template-columns:repeat(7,1fr);
      gap:15px;
    }

    .day-name{
      font-weight:700;
      color:#666;
    }

    .day{
      height:70px;
      border-radius:50%;
      display:flex;
      align-items:center;
      justify-content:center;
      font-weight:500;
      background:#f4f4f4;
    }

    .heart{
      background:#111;
      color:#fff;
      position:relative;
    }

    .heart::after{
      content:'❤';
      position:absolute;
      bottom:-10px;
      font-size:14px;
    }

    /* =========================
       COUPLE IMAGE
    ========================== */

    .couple-image img{
      border-radius:30px;
      max-height:700px;
      object-fit:cover;
    }

    /* =========================
       SCHEDULE
    ========================== */

    .schedule{
      background:#111;
      color:#fff;
    }

    .schedule .section-title{
      color:#fff;
    }

    .timeline{
      max-width:900px;
      margin:auto;
      display:flex;
      flex-direction:column;
      gap:25px;
    }

    .timeline-item{
      background:#1f1f1f;
      padding:25px;
      border-radius:20px;
      transition:0.3s;
    }

    .timeline-item:hover{
      transform:translateY(-5px);
    }

    .timeline-item h3{
      font-size:24px;
      margin-bottom:8px;
    }

    .timeline-item p{
      color:#ccc;
    }

    /* =========================
       MAP SECTION
    ========================== */

    .map-grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:40px;
    }

    .map-card{
      background:#fff;
      border-radius:25px;
      overflow:hidden;
      box-shadow:0 10px 40px rgba(0,0,0,0.08);
      transition:0.4s;
    }

    .map-card:hover{
      transform:translateY(-6px);
    }

    .map-card img{
      height:320px;
      object-fit:cover;
    }

    .map-content{
      padding:25px;
    }

    .map-content h3{
      font-size:28px;
      margin-bottom:12px;
    }

    .map-btn{
      margin-top:20px;
      display:inline-block;
      padding:12px 25px;
      background:#111;
      color:#fff;
      border-radius:40px;
      transition:0.3s;
    }

    .map-btn:hover{
      background:#333;
    }

    /* =========================
       FOOTER
    ========================== */

    footer{
      background:#111;
      color:#fff;
      text-align:center;
      padding:40px 20px;
    }

    footer h2{
      font-size:34px;
      margin-bottom:10px;
    }

    footer p{
      color:#bbb;
    }

    /* =========================
       RESPONSIVE
    ============
